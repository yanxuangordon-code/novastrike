<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NOVA STRIKE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Orbitron',monospace;}
#wrap{position:relative;width:480px;height:680px;overflow:hidden;}
canvas{display:block;width:480px;height:680px;}
.sc{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.sc.hide{display:none!important;}
.btn{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:3px;padding:10px 28px;border:2px solid currentColor;background:transparent;cursor:pointer;transition:all .12s;}
.btn:hover{filter:brightness(1.3);}
.btn.c{color:#00ffff;} .btn.y{color:#ffff00;} .btn.m{color:#ff00ff;} .btn.r{color:#ff4444;}
/* TITLE */
#sTitle{background:rgba(0,0,8,.95);}
.logo{font-size:54px;font-weight:900;letter-spacing:4px;text-align:center;line-height:1.05;background:linear-gradient(135deg,#00ffff,#ff00ff,#ffff00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 20px #00ffff88);}
.logo-sub{font-size:9px;color:#ff00ff66;letter-spacing:8px;margin-top:-6px;}
.diff-row{display:flex;gap:8px;}
.db{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:2px;padding:6px 14px;border:2px solid #ff00ff;color:#ff00ff;background:transparent;cursor:pointer;}
.db.sel{background:#ff00ff22;}
.hint{font-size:8px;color:#ffffff18;letter-spacing:2px;text-align:center;line-height:2.2;}
.coins{font-size:14px;color:#ffff00;letter-spacing:3px;}
/* SHOP */
#sShop{background:rgba(0,0,8,.97);padding:0;justify-content:flex-start;overflow-y:auto;}
.sh-hdr{width:100%;padding:10px 14px 8px;background:rgba(0,0,8,.97);border-bottom:1px solid #1a2535;position:sticky;top:0;z-index:2;}
.sh-title{font-size:15px;font-weight:900;color:#ffff00;letter-spacing:4px;}
.sh-tabs{display:flex;gap:7px;margin-top:8px;}
.tab{font-family:'Orbitron',monospace;font-size:8px;font-weight:700;letter-spacing:2px;padding:5px 12px;border:2px solid;background:transparent;cursor:pointer;opacity:.45;}
.tab.act{opacity:1;}
.tab.c{color:#00ffff;border-color:#00ffff;} .tab.m{color:#ff00ff;border-color:#ff00ff;} .tab.r{color:#ff4444;border-color:#ff4444;}
#shBody{padding:10px 14px;width:100%;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.card{border:2px solid #1a2535;background:#050a14;padding:10px;cursor:pointer;transition:border-color .12s;}
.card:hover{border-color:#ffffff33;} .card.owned{border-color:#00ffff44;} .card.active{border-color:#ffff00;background:#ffff0008;} .card.maxed{border-color:#ff00ff44;}
.ci{font-size:20px;} .cn{font-size:9px;font-weight:700;color:#fff;letter-spacing:1px;margin-top:3px;} .cd{font-size:7px;color:#ffffff33;margin-top:2px;line-height:1.5;} .cc{font-size:9px;color:#ffff00;margin-top:5px;}
.bars{display:flex;gap:3px;margin:4px 0;} .bar{flex:1;height:5px;background:#ffffff10;border-radius:2px;} .bar.f{background:#ff00ff;}
.sec{font-size:8px;color:#00ffff66;letter-spacing:4px;margin:10px 0 6px;border-bottom:1px solid #00ffff18;padding-bottom:4px;}
/* HUD */
#hud{position:absolute;top:0;left:0;right:0;z-index:5;pointer-events:none;padding:6px 12px;display:flex;justify-content:space-between;align-items:flex-start;background:linear-gradient(rgba(0,0,8,.85),transparent);}
.hl{font-size:8px;color:#ffffff28;letter-spacing:2px;} .hv{font-size:14px;font-weight:700;color:#fff;transition:transform .1s;}.hv.bump{transform:scale(1.25);} .hlv{display:flex;gap:3px;margin-top:2px;}
#ebar{position:absolute;bottom:12px;left:12px;right:12px;z-index:5;pointer-events:none;}
.el{display:flex;justify-content:space-between;margin-bottom:3px;font-size:8px;color:#ffff00;letter-spacing:2px;}
#ebg{height:7px;background:rgba(255,255,0,.07);border:1px solid rgba(255,255,0,.18);border-radius:3px;overflow:hidden;}
#efill{height:100%;width:0%;border-radius:3px;transition:width .08s;}
#spbar{position:absolute;bottom:28px;left:12px;right:12px;z-index:5;pointer-events:none;opacity:0;transition:opacity .18s;}
#spbg{height:4px;background:rgba(255,0,255,.07);border:1px solid rgba(255,0,255,.3);border-radius:2px;overflow:hidden;}
#spfill{height:100%;width:0%;background:linear-gradient(90deg,#ff00ff,#fff);border-radius:2px;}
#misshud{position:absolute;bottom:28px;right:12px;font-size:12px;z-index:5;pointer-events:none;letter-spacing:1px;}
#pbar{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.05);z-index:5;}
#pfill{height:100%;background:linear-gradient(90deg,#00ffff,#ff00ff);width:0%;}
#ann{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:900;letter-spacing:5px;text-shadow:0 0 16px currentColor;text-align:center;opacity:0;transition:opacity .3s;pointer-events:none;z-index:6;}
#acht{position:absolute;top:50px;left:50%;transform:translateX(-50%);border:2px solid #ffff00;background:rgba(0,0,8,.95);padding:6px 16px;text-align:center;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9;white-space:nowrap;}
#fl{position:absolute;inset:0;opacity:0;pointer-events:none;z-index:8;}
/* PAUSE */
#sPause{background:rgba(0,0,8,.88);}
.pt{font-size:26px;font-weight:900;color:#00ffff;letter-spacing:6px;text-shadow:0 0 16px #00ffff88;}
/* DEAD/WIN */
.rs{background:rgba(0,0,8,.88);}
.rt{font-size:44px;font-weight:900;letter-spacing:5px;}
.rs2{font-size:18px;color:#fff;letter-spacing:3px;}
.rh{font-size:11px;color:#ffff00;letter-spacing:2px;}
.rst{font-size:8px;color:#ffffff28;letter-spacing:2px;line-height:2.3;text-align:center;}
/* ACHIEVEMENTS */
#sAch{background:rgba(0,0,8,.97);}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:5px;max-width:420px;overflow-y:auto;max-height:520px;}
.ac{display:flex;gap:6px;align-items:center;padding:6px 8px;border:1px solid;}
.ac.e{border-color:#ffff0066;background:rgba(255,255,0,.04);}
.ac.l{border-color:#ffffff10;opacity:.4;}
</style>
</head>
<body>
<div id="wrap">
<canvas id="c" width="480" height="680"></canvas>

<!-- HUD -->
<div id="hud" style="display:none">
  <div><div class="hl">SCORE</div><div class="hv" id="hSc">0</div></div>
  <div style="text-align:center"><div style="font-size:9px;color:#ff00ff;letter-spacing:3px;" id="hWv">WAVE 1</div><div style="font-size:7px;color:#ffffff18;letter-spacing:1px;margin-top:1px;" id="hHi"></div><div style="font-size:7px;letter-spacing:1px;margin-top:1px;" id="hWpn"></div><div style="font-size:7px;color:#00ffff55;letter-spacing:2px;margin-top:1px;" id="hTime">0:00</div></div>
  <div style="text-align:right"><div class="hl">LIVES</div><div class="hlv" id="hLv"></div></div>
</div>
<div id="pbar" style="display:none"><div id="pfill"></div></div>
<div id="ebar" style="display:none">
  <div class="el"><span>⚡ ENERGY</span><span id="etier"></span></div>
  <div id="ebg"><div id="efill"></div></div>
</div>
<div id="spbar"><div style="font-size:7px;color:#ff00ff66;letter-spacing:2px;margin-bottom:2px;">HOLD X — CHARGING</div><div id="spbg"><div id="spfill"></div></div></div>
<div id="misshud" style="display:none"></div>
<div id="ann"></div>
<div id="acht"><span id="ai">🏆</span> <span id="an" style="font-size:9px;color:#ffff00;letter-spacing:3px;"></span><span id="ad" style="font-size:7px;color:#ffffff44;display:block;"></span></div>
<div id="fl"></div>

<!-- TITLE -->
<div class="sc" id="sTitle">
  <canvas id="tbg" width="480" height="680" style="position:absolute;inset:0;z-index:0;pointer-events:none;"></canvas>
  <div class="logo" style="z-index:1">NOVA<br>STRIKE</div>
  <div class="logo-sub" style="z-index:1">GALACTIC DEFENDER</div>
  <div class="coins" id="tc" style="z-index:1">💰 0</div>
  <div id="titleStats" style="z-index:1;text-align:center;margin-top:-2px;padding:8px 20px;border:1px solid #ffffff12;background:rgba(255,255,255,.03);min-width:300px;"></div>
  <div class="diff-row" style="z-index:1">
    <button class="db sel" id="dE" onclick="setD(0)">EASY</button>
    <button class="db" id="dN" onclick="setD(1)">NORMAL</button>
    <button class="db" id="dH" onclick="setD(2)">HARD</button>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px;align-items:center;z-index:1">
    <button class="btn c" onclick="startGame()">▶ LAUNCH</button>
    <div style="display:flex;gap:8px">
      <button class="btn y" onclick="goShop()">🏪 SHOP</button>
      <button class="btn m" onclick="goAch()">🏆 AWARDS</button>
    </div>
  </div>
  <div class="hint" style="z-index:1">Z / SPACE = SHOOT &nbsp;·&nbsp; HOLD X = SPECIAL &nbsp;·&nbsp; ESC = PAUSE</div>
</div>

<!-- SHOP -->
<div class="sc hide" id="sShop">
  <div class="sh-hdr">
    <div style="display:flex;justify-content:space-between;align-items:center"><div class="sh-title">HANGAR</div><div class="coins" id="sc" style="font-size:11px;">💰 0</div></div>
    <div class="sh-tabs">
      <button class="tab c act" id="tw" onclick="shopTab('w')">WEAPONS</button>
      <button class="tab m" id="tp" onclick="shopTab('p')">SHIP PARTS</button>
      <button class="btn r" onclick="goTitle()" style="font-size:8px;padding:4px 10px;margin-left:auto;">BACK</button>
    </div>
  </div>
  <div id="shBody"></div>
</div>

<!-- ACHIEVEMENTS -->
<div class="sc hide" id="sAch">
  <div style="font-size:14px;font-weight:900;color:#ffff00;letter-spacing:5px;margin-bottom:12px;">ACHIEVEMENTS</div>
  <div class="ag" id="ag"></div>
  <button class="btn c" onclick="goTitle()" style="margin-top:12px;font-size:9px;padding:7px 20px;">BACK</button>
</div>

<!-- PAUSE -->
<div class="sc hide" id="sPause">
  <div class="pt">PAUSED</div>
  <div style="font-size:9px;color:#ffffff33;letter-spacing:3px;" id="pst"></div>
  <button class="btn c" onclick="resume()">▶ RESUME</button>
  <button class="btn y" onclick="goShop()">🏪 SHOP</button>
  <button class="btn r" onclick="goTitle()">⏹ QUIT</button>
</div>

<!-- DEAD -->
<div class="sc hide rs" id="sDead">
  <div class="rt" style="color:#ff0044;text-shadow:0 0 28px #ff0044">GAME<br>OVER</div>
  <div class="rs2">SCORE: <span id="gsc">0</span></div>
  <div class="rh" id="ghi"></div>
  <div class="rst" id="gst"></div>
  <div id="gtop" style="font-size:8px;color:#ffffff28;letter-spacing:2px;text-align:center;line-height:2.2;"></div>
  <div style="font-size:9px;color:#ffff0088;" id="gcn"></div>
  <div style="display:flex;gap:8px">
    <button class="btn c" onclick="startGame()">RETRY</button>
    <button class="btn y" onclick="goTitle()">MENU</button>
  </div>
</div>
</div>

<script>
'use strict';
const cv=document.getElementById('c'),X=cv.getContext('2d');
const W=480,H=680;

// ══════════════════════════════════════════════
// SAVE
// ══════════════════════════════════════════════
const SV={
  d:{coins:0,scores:[[0,0,0],[0,0,0],[0,0,0]],bestTime:[0,0,0],ach:{},wpns:{single:true},activeWpn:'single',
     parts:{hull:0,turret:0,engine:0,wings:0,reactor:0,armor:0}},
  binId:localStorage.getItem('ns7b')||null,
  load(){try{const s=localStorage.getItem('ns7');if(s)Object.assign(this.d,JSON.parse(s));}catch(e){}},
  save(){try{localStorage.setItem('ns7',JSON.stringify(this.d));}catch(e){}this.push();},
  async push(){if(this._b)return;this._b=true;try{const body=JSON.stringify(this.d);let r;if(this.binId){r=await fetch('https://api.jsonbin.io/v3/b/'+this.binId,{method:'PUT',headers:{'Content-Type':'application/json','X-Bin-Versioning':'false'},body});}else{r=await fetch('https://api.jsonbin.io/v3/b',{method:'POST',headers:{'Content-Type':'application/json','X-Bin-Name':'NS7'},body});const j=await r.json();if(j.metadata?.id){this.binId=j.metadata.id;localStorage.setItem('ns7b',this.binId);}}}catch(e){}this._b=false;},
  async pull(){if(!this.binId)return;try{const r=await fetch('https://api.jsonbin.io/v3/b/'+this.binId+'/latest');if(!r.ok)return;const rem=(await r.json()).record;if(!rem)return;if(rem.coins>this.d.coins)this.d.coins=rem.coins;if(rem.wpns)Object.assign(this.d.wpns,rem.wpns);if(rem.parts)for(const k in rem.parts)if((rem.parts[k]||0)>(this.d.parts[k]||0))this.d.parts[k]=rem.parts[k];if(rem.ach)Object.assign(this.d.ach,rem.ach);if(rem.scores)for(let i=0;i<3;i++){const a=[...this.d.scores[i],...(rem.scores[i]||[])];this.d.scores[i]=a.sort((a,b)=>b-a).slice(0,3);}localStorage.setItem('ns7',JSON.stringify(this.d));}catch(e){}}
};
SV.load();SV.pull();

// ══════════════════════════════════════════════
// WEAPONS
// ══════════════════════════════════════════════
const WPNS={
  single: {n:'SINGLE', ic:'🔵',desc:'Reliable laser',        cost:0,    col:'#00ffff', fire(x,y,s){return[[x,y,0,-s,3,10]];}},
  double: {n:'DUAL',   ic:'🔷',desc:'Two parallel beams',    cost:200,  col:'#44ffaa', fire(x,y,s){return[[x-7,y,0,-s,3,10],[x+7,y,0,-s,3,10]];}},
  triple: {n:'TRIPLE', ic:'🔶',desc:'Three beams',           cost:500,  col:'#ffff00', fire(x,y,s){return[[x-9,y-3,-0,-s,3,10],[x,y,0,-(s+1),4,11],[x+9,y-3,0,-s,3,10]];}},
  spread: {n:'SPREAD', ic:'💥',desc:'5-way wide spread',     cost:1000, col:'#ff8800', fire(x,y,s){return[[-2.2,-1.1,0,1.1,2.2].map((v,i)=>[x,y,v*1.5,-(s*.9),3,10])][0];}},
  laser:  {n:'LASER',  ic:'🔴',desc:'Rapid piercing beam',   cost:2000, col:'#ff00ff', fire(x,y,s){return[[x,y,0,-s*1.35,4,16]];}},
  plasma: {n:'PLASMA', ic:'🟣',desc:'Huge slow plasma balls',cost:3500, col:'#cc00ff', fire(x,y,s){return[[x,y,0,-s*.65,10,10]];}},
  missile:{n:'MISSILE',ic:'🚀',desc:'Homing rockets',        cost:6000, col:'#ff4444', fire:null},
};

// ══════════════════════════════════════════════
// SHIP PARTS
// ══════════════════════════════════════════════
const PRTS={
  hull:   {n:'HULL',   ic:'🛡',desc:'More lives',          maxLv:4,costs:[150,300,600,1200],vals:[3,4,5,6]},
  turret: {n:'TURRET', ic:'⚔️',desc:'Bullet damage',       maxLv:4,costs:[200,400,800,1600],vals:[1,1.4,1.8,2.5]},
  engine: {n:'ENGINE', ic:'🔥',desc:'Move speed',          maxLv:4,costs:[150,300,600,1200],vals:[4.5,5.5,6.5,8]},
  wings:  {n:'WINGS',  ic:'✈️',desc:'Bullet speed',        maxLv:4,costs:[120,240,480,960], vals:[12,14,16,20]},
  reactor:{n:'REACTOR',ic:'⚡',desc:'Energy gain rate',    maxLv:4,costs:[200,400,800,1600],vals:[1,1.5,2.2,3.5]},
  armor:  {n:'ARMOR',  ic:'💠',desc:'Invincibility frames',maxLv:4,costs:[180,360,720,1440],vals:[90,130,170,220]},
};
const pv=k=>PRTS[k].vals[SV.d.parts[k]||0];

// ══════════════════════════════════════════════
// ACHIEVEMENTS
// ══════════════════════════════════════════════
const ACHS=[
  {id:'first_blood',ic:'🩸',n:'FIRST BLOOD',  d:'Kill first enemy'},
  {id:'combo10',    ic:'🔥',n:'ON FIRE',       d:'10× combo streak'},
  {id:'untouchable',ic:'💎',n:'UNTOUCHABLE',   d:'Clear wave, no damage'},
  {id:'boss_slayer',ic:'💀',n:'BOSS SLAYER',   d:'Defeat a boss'},
  {id:'wave10',     ic:'🌊',n:'DEEP WATER',    d:'Reach wave 10'},
  {id:'nuke',       ic:'💣',n:'NUKE LAUNCH',   d:'Use tier-4 special'},
  {id:'rich',       ic:'💰',n:'SPACE TYCOON',  d:'Accumulate 5000 coins'},
  {id:'centurion',  ic:'💯',n:'CENTURION',     d:'100 kills in one run'},
  {id:'maxed',      ic:'⭐',n:'MAXED OUT',     d:'Max any ship part'},
  {id:'collector',  ic:'🎖️',n:'COLLECTOR',    d:'Earn all achievements'},
];
function ach(id){
  if(SV.d.ach[id])return;
  SV.d.ach[id]=1;SV.save();
  const a=ACHS.find(x=>x.id===id);if(!a)return;
  document.getElementById('ai').textContent=a.ic;
  document.getElementById('an').textContent='🏆 '+a.n;
  document.getElementById('ad').textContent=a.d;
  const el=document.getElementById('acht');el.style.opacity='1';
  clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',3000);
  if(ACHS.slice(0,-1).every(a=>SV.d.ach[a.id]))ach('collector');
}

// ══════════════════════════════════════════════
// DIFFICULTY
// ══════════════════════════════════════════════
const DIFFS=[
  {n:'EASY',  spd:.6,  fire:.003,bossHp:50, sx:1,  cx:1},
  {n:'NORMAL',spd:.9,  fire:.007,bossHp:110,sx:1.5,cx:1.5},
  {n:'HARD',  spd:1.25,fire:.014,bossHp:180,sx:2.5,cx:2.5},
];
let DI=0;
function setD(n){DI=n;['dE','dN','dH'].forEach((id,i)=>document.getElementById(id).classList.toggle('sel',i===n));refreshTitleStats();}

// ══════════════════════════════════════════════
// STARS / NEBULA
// ══════════════════════════════════════════════
const STARS=Array.from({length:180},()=>({x:Math.random()*W,y:Math.random()*H,s:.3+Math.random()*1.8,sp:.06+Math.random()*.7,layer:Math.floor(Math.random()*3),c:`hsl(${200+Math.random()*80},60%,${65+Math.random()*25}%)`}));
const NEBS=Array.from({length:5},()=>({x:Math.random()*W,y:Math.random()*H,r:80+Math.random()*130,sp:.02+Math.random()*.05,h:Math.random()*360,a:.04+Math.random()*.06}));
let bgH=220,gtime=0;

// Pre-computed planet position (static per game session)
const PLANET={x:W*.72,y:H*.18,r:55,hue:210+Math.random()*40};

function drawBG(){
  bgH+=.004;
  const bossT=bossMode?Math.min(1,waveClearTimer===0?(gtime-waveStartT||0)/180:1):Math.max(0,(bgBossBlend||0)-.004);
  bgBossBlend=bossT;
  const hShift=bossT*140;

  // Sky gradient
  const sky=X.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,`hsl(${(bgH+hShift)%360},${38+bossT*18}%,${2+bossT*2}%)`);
  sky.addColorStop(.6,`hsl(${(bgH+50+hShift*.7)%360},${35+bossT*15}%,3%)`);
  sky.addColorStop(1,`hsl(${(bgH+20)%360},45%,2%)`);
  X.fillStyle=sky;X.fillRect(0,0,W,H);

  // Distant planet
  {
    const p=PLANET;
    // atmosphere halo — two rings at low alpha
    X.globalAlpha=.08;X.fillStyle=`hsl(${p.hue},70%,60%)`;
    X.beginPath();X.arc(p.x,p.y,p.r+22,0,Math.PI*2);X.fill();
    X.globalAlpha=.14;X.fillStyle=`hsl(${p.hue},65%,55%)`;
    X.beginPath();X.arc(p.x,p.y,p.r+10,0,Math.PI*2);X.fill();
    // Planet body
    const pg=X.createRadialGradient(p.x-p.r*.3,p.y-p.r*.3,p.r*.1,p.x,p.y,p.r);
    pg.addColorStop(0,`hsl(${p.hue+20},55%,35%)`);
    pg.addColorStop(.6,`hsl(${p.hue},60%,18%)`);
    pg.addColorStop(1,`hsl(${p.hue-20},50%,8%)`);
    X.globalAlpha=.55;X.fillStyle=pg;X.beginPath();X.arc(p.x,p.y,p.r,0,Math.PI*2);X.fill();
    // Surface band lines
    X.globalAlpha=.07;X.strokeStyle=`hsl(${p.hue+30},80%,75%)`;
    for(let i=-3;i<=3;i++){
      const dy=i*p.r*.28,hw=Math.sqrt(Math.max(0,p.r*p.r-dy*dy));
      X.lineWidth=3+Math.abs(i);
      X.beginPath();X.arc(p.x,p.y,p.r,0,Math.PI*2);X.save();
      X.beginPath();X.rect(p.x-p.r,p.y+dy-3,p.r*2,6);X.clip();
      X.beginPath();X.arc(p.x,p.y,p.r,0,Math.PI*2);X.stroke();X.restore();
    }
    // Shadow (dark half)
    const sg=X.createRadialGradient(p.x+p.r*.5,p.y+p.r*.4,0,p.x+p.r*.3,p.y+p.r*.2,p.r*1.1);
    sg.addColorStop(0,'transparent');sg.addColorStop(.55,'transparent');
    sg.addColorStop(.8,'rgba(0,0,0,.4)');sg.addColorStop(1,'rgba(0,0,0,.65)');
    X.globalAlpha=1;X.fillStyle=sg;X.beginPath();X.arc(p.x,p.y,p.r,0,Math.PI*2);X.fill();
  }

  // Nebula clouds
  for(const n of NEBS){
    n.y+=n.sp;if(n.y>H+n.r)n.y=-n.r;
    const g=X.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    const nh=(n.h+hShift*1.5)%360;
    g.addColorStop(0,`hsla(${nh},65%,${22+bossT*12}%,${n.a+bossT*.03})`);
    g.addColorStop(1,'transparent');
    X.fillStyle=g;X.fillRect(n.x-n.r,n.y-n.r,n.r*2,n.r*2);
  }
  X.globalAlpha=1;

  // Stars — 3 parallax layers
  const sp=[.06,.16,.42];
  for(const s of STARS){
    s.y+=sp[s.layer];if(s.y>H+1)s.y=-1;
    const twinkle=.35+.45*Math.sin(gtime*.014+s.x*7.3);
    X.globalAlpha=twinkle*(s.layer*.3+.35);
    X.fillStyle=s.c;const sz=Math.max(1,s.s*(s.layer*.4+.5))|0;
    X.fillRect(s.x|0,s.y|0,sz,sz);
    // Occasional star flare (brightest layer, every ~20 stars)
    if(s.layer===2&&sz>=2&&twinkle>.7){
      X.globalAlpha=(twinkle-.7)*.5;X.fillStyle='#ffffff';
      X.fillRect(s.x|0-1,s.y|0,sz+2,1);X.fillRect(s.x|0,s.y|0-1,1,sz+2);
    }
  }
  X.globalAlpha=1;

  // Subtle grid horizon (bottom third)
  X.save();X.globalAlpha=.025+.01*Math.sin(gtime*.006);X.strokeStyle=`hsl(${180+bossT*60},80%,60%)`;X.lineWidth=1;
  const hz=H*.58;
  for(let i=-7;i<=7;i++){const x=W/2+i*(W/8);X.beginPath();X.moveTo(x,hz);X.lineTo(W/2+i*2,H+10);X.stroke();}
  for(let y=hz;y<H;y+=22){const f=(y-hz)/(H-hz);X.globalAlpha=(.025+.01*Math.sin(gtime*.006))*f;X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();}
  X.restore();

  // CRT scanlines (very subtle)
  X.save();X.globalAlpha=.028;X.fillStyle='#000';
  for(let y=0;y<H;y+=2)X.fillRect(0,y,W,1);
  X.restore();
}

function fireMissile(){

  const alive=ENEMIES.filter(e=>!e.dead&&e.y>0&&e.y<H);
  if(!alive.length)return;
  alive.sort((a,b)=>Math.hypot(a.x-P.x,a.y-P.y)-Math.hypot(b.x-P.x,b.y-P.y));
  alive.slice(0,3).forEach(t=>MS.push({x:P.x+(Math.random()-.5)*16,y:P.y-20,vx:(Math.random()-.5)*2,vy:-3,target:t,age:0,trail:[]}));

}
function tickMS(){
  for(let i=MS.length-1;i>=0;i--){
    const m=MS[i];m.age++;
    m.trail.push({x:m.x,y:m.y});if(m.trail.length>12)m.trail.shift();
    if(m.age>15){if(!m.target||m.target.dead)m.target=ENEMIES.filter(e=>!e.dead).sort((a,b)=>Math.hypot(a.x-m.x,a.y-m.y)-Math.hypot(b.x-m.x,b.y-m.y))[0]||null;if(m.target){const dx=m.target.x-m.x,dy=m.target.y-m.y,d=Math.hypot(dx,dy)||1;m.vx+=dx/d*.5;m.vy+=dy/d*.5;const sp=Math.hypot(m.vx,m.vy);if(sp>8){m.vx=m.vx/sp*8;m.vy=m.vy/sp*8;}}}
    m.x+=m.vx;m.y+=m.vy;
    let hit=false;
    for(const e of ENEMIES){if(e.dead)continue;if(Math.hypot(m.x-e.x,m.y-e.y)<e.w/2+8){const dmg=Math.ceil(2*pv('turret'));e.hp-=dmg;e.hf=8;dnum(e.x,e.y-10,dmg,'#ff8800');if(e.hp<=0)killEnemy(e);burst(m.x,m.y,12,[EC[e.ci][0],'#ff8800','#fff'],5);shake(3);sw(m.x,m.y,'#ff8800',65);hit=true;break;}}
    if(hit||m.y<-30||m.y>H+30||m.x<-40||m.x>W+40)MS.splice(i,1);
  }
}

    X.closePath();X.fill();X.stroke();

  },
  draw(){
    // ── ENGINE TRAIL ──
    if(this.trail&&this.trail.length>2){
      for(let i=1;i<this.trail.length;i++){
        const pt=this.trail[i],a=i/this.trail.length;
        const sz=(a*5)|0||1;
        X.globalAlpha=a*.25;X.fillStyle=`hsl(${185+a*25},100%,${60+a*18}%)`;
        X.fillRect(pt.x-sz/2,pt.y-sz/2,sz,sz);
      }
      X.globalAlpha=1;
    }
    if(this.inv>0&&Math.floor(this.inv/3)%2)return;
    const eg=.5+.5*Math.sin(this.throb);
    const wc=WPNS[SV.d.activeWpn].col;
    X.save();X.translate(this.x,this.y);

    // ── ENGINE FLAMES ──
    const fl=6+eg*9;
    X.globalAlpha=.5+eg*.3;X.fillStyle=`hsl(${28+eg*14},100%,${48+eg*12}%)`;
    X.beginPath();X.moveTo(-8,11);X.lineTo(0,11+fl*1.4);X.lineTo(8,11);X.closePath();X.fill();
    X.globalAlpha=.9;X.fillStyle=`hsl(${55+eg*10},100%,${80+eg*12}%)`;
    X.beginPath();X.moveTo(-4,11);X.lineTo(0,11+fl*.85);X.lineTo(4,11);X.closePath();X.fill();
    const sfl=3+eg*5;
    X.globalAlpha=.45+eg*.25;X.fillStyle=`hsl(${200+eg*20},100%,65%)`;
    X.beginPath();X.moveTo(-14,7);X.lineTo(-11,7+sfl);X.lineTo(-8,7);X.closePath();X.fill();
    X.beginPath();X.moveTo(8,7);X.lineTo(11,7+sfl);X.lineTo(14,7);X.closePath();X.fill();
    X.globalAlpha=1;

    // ── WINGS ──
    const engLv=SV.d.parts.engine||0;
    const wCol=['#1a3a6a','#1a4a8a','#2a6aaa','#3a8acc'][Math.min(engLv,3)];
    const wAcc=['#335599','#4466cc','#55aaff','#88ccff'][Math.min(engLv,3)];
    X.fillStyle=wCol;
    X.beginPath();X.moveTo(-6,6);X.lineTo(-21,14);X.lineTo(-21,5);X.lineTo(-11,-3);X.closePath();X.fill();
    X.beginPath();X.moveTo(6,6);X.lineTo(21,14);X.lineTo(21,5);X.lineTo(11,-3);X.closePath();X.fill();
    X.fillStyle=wAcc;X.globalAlpha=.6;
    X.beginPath();X.moveTo(-7,5);X.lineTo(-19,12);X.lineTo(-19,6);X.lineTo(-11,-1);X.closePath();X.fill();
    X.beginPath();X.moveTo(7,5);X.lineTo(19,12);X.lineTo(19,6);X.lineTo(11,-1);X.closePath();X.fill();
    X.globalAlpha=1;
    // Wing tip blinkers
    const wl=.5+.5*Math.sin(this.throb*2.2);
    X.fillStyle=`rgba(80,${180+engLv*18},255,${.45+wl*.55})`;
    X.beginPath();X.arc(-20,10,2.5,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(20,10,2.5,0,Math.PI*2);X.fill();

    // ── HULL ──
    const hg=X.createLinearGradient(0,-16,0,14);
    hg.addColorStop(0,'#0a2248');hg.addColorStop(.3,wc+'77');hg.addColorStop(.7,'#0d2850');hg.addColorStop(1,'#061428');
    X.fillStyle=hg;
    X.beginPath();X.moveTo(0,-16);X.lineTo(-13,4);X.lineTo(-6,8);X.lineTo(6,8);X.lineTo(13,4);X.closePath();X.fill();
    // Center spine
    X.globalAlpha=.25;X.fillStyle=wc;
    X.beginPath();X.moveTo(0,-14);X.lineTo(-3,2);X.lineTo(3,2);X.closePath();X.fill();
    X.globalAlpha=1;

    // ── CANNONS ──
    X.fillStyle='#223355';X.fillRect(-12,3,4,11);X.fillRect(8,3,4,11);
    X.fillStyle=wc;X.globalAlpha=.85;X.fillRect(-11,4,2,10);X.fillRect(9,4,2,10);
    if(this.shootT>5){
      X.globalAlpha=(.5+.5*Math.sin(gtime*.35))*(.9-(this.shootT-5)/9);
      X.fillStyle=wc;X.beginPath();X.arc(-10,14,3,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(10,14,3,0,Math.PI*2);X.fill();
    }
    X.globalAlpha=1;

    // ── COCKPIT ──
    X.fillStyle='#0a1f40';X.beginPath();X.ellipse(0,-5,7,9,0,0,Math.PI*2);X.fill();
    const cg=X.createRadialGradient(-2,-8,0,0,-5,7);
    cg.addColorStop(0,'#bbeeFF');cg.addColorStop(.5,'#44aaccaa');cg.addColorStop(1,'#002244cc');
    X.fillStyle=cg;X.beginPath();X.ellipse(0,-5,5.5,7.5,0,0,Math.PI*2);X.fill();
    X.globalAlpha=.55;X.fillStyle='rgba(255,255,255,.85)';
    X.beginPath();X.ellipse(-2,-7,1.5,3.5,-.4,0,Math.PI*2);X.fill();
    X.globalAlpha=1;

    // ── SHIELD ──
    if(this.shield){
      const sa=.3+.18*Math.sin(Date.now()*.007);
      X.globalAlpha=sa;X.strokeStyle='#00ffff';X.lineWidth=2;
      X.beginPath();
      for(let i=0;i<6;i++){const a2=(i/6)*Math.PI*2-Math.PI/6;i===0?X.moveTo(Math.cos(a2)*30,Math.sin(a2)*30):X.lineTo(Math.cos(a2)*30,Math.sin(a2)*30);}
      X.closePath();X.stroke();
      X.globalAlpha=sa*.25;X.fillStyle='#00ffff';
      X.beginPath();
      for(let i=0;i<6;i++){const a2=(i/6)*Math.PI*2-Math.PI/6;i===0?X.moveTo(Math.cos(a2)*30,Math.sin(a2)*30):X.lineTo(Math.cos(a2)*30,Math.sin(a2)*30);}
      X.closePath();X.fill();
      X.globalAlpha=1;
    }
    X.restore();
  }
};

// ══════════════════════════════════════════════
// ENEMIES  — simple, clean system
// ══════════════════════════════════════════════
// Each enemy: {type,x,y,ox,oy,w,h,hp,maxHp,pts,eg,ci,dead,hf,animT,fireT,
//              diving,diveT,dPhase,dSX,dSY,dTX,dTY,rSX,rSY,fig8,zigDir,phaseT,visible}
// Types: 0=grunt 1=shooter 2=tank 3=zigzag 4=splitter 5=phantom 6=boss
const ET2=[
  {hp:1,pts:100,eg:5, w:26,h:20},
  {hp:1,pts:150,eg:7, w:26,h:20},
  {hp:3,pts:300,eg:15,w:30,h:24},
  {hp:1,pts:200,eg:8, w:24,h:18},
  {hp:2,pts:250,eg:12,w:28,h:22},
  {hp:1,pts:220,eg:10,w:26,h:20},
  {hp:100,pts:5000,eg:50,w:70,h:56},
];

const ENEMIES=[];
let formation=[]; // formation enemies (subset of ENEMIES)
let fX=0,fDX=1;
let bossMode=false;
let diveCool=0;
let waveState='idle'; // 'idle'|'active'|'clearing'
let nearMiss=false;
let waveClearTimer=0; // counts down after last enemy dies

function makeE(type,x,y,row,col2){
  const et=ET2[type],d=DIFFS[DI];
  const hp=type===6?d.bossHp:et.hp;
  return{type,x,y,ox:x,oy:y,w:et.w,h:et.h,hp,maxHp:hp,row,col2,
    pts:et.pts,eg:et.eg,ci:Math.min(type,EC.length-1),
    dead:false,hf:0,animT:Math.random()*Math.PI*2,
    fireT:60+Math.random()*80,
    diving:false,diveT:0,dPhase:0,dSX:0,dSY:0,dTX:0,dTY:0,rSX:0,rSY:0,
    fig8:false,zigDir:1,phaseT:0,visible:true,
    // pop-in
    popT:-( (col2||0)*.07+(row||0)*.1), // staggered delay
  };
}

function startDive(e){
  if(e.dead||e.diving)return;
  e.diving=true;e.diveT=0;e.dPhase=0;e.dSX=e.x;e.dSY=e.y;
  e.dTX=P.x+(Math.random()-.5)*50;e.dTY=H+40;
  e.diveWarn=40; // frames to show dive warning
}
function bez(t,p0,p1,p2){return(1-t)*(1-t)*p0+2*(1-t)*t*p1+t*t*p2;}

// ── SPAWN WAVE ──
function spawnWave(wn){
  // clear everything
  ENEMIES.length=0;
  formation.length=0;
  PB.length=0;EB.length=0;
  PUPS.length=0;
  fX=0;diveCool=60;
  waveState='active';waveClearTimer=0;
  bossMode=false;

  if(wn%5===0){
    bossMode=true;const b=makeE(6,W/2,100,0,0);ENEMIES.push(b);
    for(let i=0;i<4;i++){const e=makeE(1,W/2+(i%2===0?-1:1)*(90+i*18),i*30+60,1,i);ENEMIES.push(e);}
  } else {
    const diff_offset=DI===0?-1:DI===2?1:0;
    const rows=Math.min(2+Math.floor(wn/2)+diff_offset,5);
    const cols=Math.min(4+Math.floor(wn/3)+diff_offset,8);
    const sw=(W-80)/cols;
    const pool=[0];
    if(wn>=2)pool.push(1);
    if(wn>=3)pool.push(3);
    if(wn>=4)pool.push(2);
    if(wn>=5)pool.push(4);
    if(wn>=7)pool.push(5);
    fDX=DIFFS[DI].spd*(1+wn*.03);
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const tx=40+c*sw+sw/2;
        const ty=80+r*50;
        const type=r===0?0:pool[Math.floor(Math.random()*pool.length)];
        const e=makeE(type,tx,ty,r,c);
        formation.push(e);
        ENEMIES.push(e);
      }
    }
  }
}

// ── UPDATE ENEMIES ──
function updateEnemies(){
  const d=DIFFS[DI];

  // Formation scroll
  if(!bossMode){
    let minX=Infinity,maxX=-Infinity;
    for(const e of formation){if(!e.dead&&!e.diving){minX=Math.min(minX,e.ox+fX);maxX=Math.max(maxX,e.ox+fX);}}
    if(maxX>W-32)fDX=-Math.abs(fDX);
    if(minX<32)fDX=Math.abs(fDX);
    fX+=fDX;
    // Coordinated dives
    if(diveCool>0)diveCool--;
    else{
      const ready=formation.filter(e=>!e.dead&&!e.diving&&e.popT>=1);
      if(ready.length>=2){
        diveCool=Math.max(70,180-wave*3);
        const pat=Math.floor(Math.random()*3);
        if(pat===0){[ready[0],ready[ready.length-1]].forEach(e=>startDive(e));}
        else if(pat===1){const cs=[...new Set(ready.map(e=>e.col2))];const rc=cs[Math.floor(Math.random()*cs.length)];ready.filter(e=>e.col2===rc).forEach((e,i)=>setTimeout(()=>{if(!e.dead)startDive(e);},i*100));}
        else{const e=ready[Math.floor(Math.random()*ready.length)];e.fig8=true;e.diving=true;e.diveT=0;}
      }
    }
  }

  for(const e of ENEMIES){
    if(e.dead)continue;
    e.animT+=.065;
    if(e.hf>0)e.hf--;

    // Pop-in
    if(e.popT<1){e.popT=Math.min(e.popT+.06,1);}

    if(e.type===6){
      e.x=W/2+Math.sin(e.animT*.55)*160;if(e.y<100)e.y+=.8;
      e.fireT--;if(e.fireT<=0){e.fireT=24;const ph=Math.floor(e.animT*.35)%4;if(ph===0){for(let j=-2;j<=2;j++)EB.push({x:e.x+j*14,y:e.y+30,vx:j*.9,vy:3.2,w:5,h:10,col:'#ff4444'});}else if(ph===1){const dx=P.x-e.x,dy=P.y-e.y,dd=Math.hypot(dx,dy)||1;for(let j=0;j<3;j++)EB.push({x:e.x,y:e.y+30,vx:dx/dd*3.8+j*.4,vy:dy/dd*3.8,w:5,h:10,col:'#ff8800'});}else if(ph===2){for(let j=0;j<8;j++){const a=(j/8)*Math.PI*2;EB.push({x:e.x,y:e.y,vx:Math.cos(a)*3.2,vy:Math.sin(a)*3.2,w:5,h:5,col:'#ff00ff'});}}else{const dx=P.x-e.x,dy=P.y-e.y,dd=Math.hypot(dx,dy)||1;EB.push({x:e.x,y:e.y+30,vx:dx/dd*4.5,vy:dy/dd*4.5,w:6,h:12,col:'#ffff00'});}}
      continue;
    }

    if(e.type===5){e.phaseT++;e.visible=(e.phaseT%160)<110;}

    if(!e.diving){
      if(e.type!==3)e.x=e.ox+fX; else{e.x+=(e.zigDir*1.4);if(e.x>e.ox+fX+28||e.x<e.ox+fX-28)e.zigDir*=-1;}
      e.y=e.oy;
      if(e.popT>=1&&e.oy>45&&Math.random()<.00012*d.spd&&!bossMode)startDive(e);
      if((e.type===1||e.type===2)&&e.oy>0){e.fireT--;if(e.fireT<=0){e.fireT=55+Math.random()*55;e.hf=3;if(Math.random()<d.fire*28){const dx=P.x-e.x,dy=P.y-e.y,dd=Math.hypot(dx,dy)||1;EB.push({x:e.x,y:e.y+12,vx:dx/dd*2.8,vy:dy/dd*2.8+1.2,w:4,h:8,col:'#ff4444'});}}}
    } else {
      if(e.fig8){e.diveT+=.02;e.x=W/2+Math.sin(e.diveT*2)*185;e.y=H*.32+Math.sin(e.diveT)*100;if(e.type===1&&Math.random()<.008)EB.push({x:e.x,y:e.y,vx:(P.x-e.x)*.014,vy:3.2,w:4,h:8,col:'#ff4444'});if(e.diveT>Math.PI*2.3){e.fig8=false;e.diving=false;e.diveT=0;}continue;}
      if(e.dPhase===0){e.diveT+=.032;const t=Math.min(e.diveT,1),cx=e.dSX+(e.dSX<W/2?110:-110),cy=e.dSY+(e.dTY-e.dSY)*.32;e.x=bez(t,e.dSX,cx,e.dTX);e.y=bez(t,e.dSY,cy,e.dTY);if(e.type===1&&Math.random()<.009)EB.push({x:e.x,y:e.y,vx:(P.x-e.x)*.018,vy:3.5,w:4,h:8,col:'#ff4444'});if(e.diveT>=1){e.dPhase=1;e.diveT=0;e.rSX=e.x;e.rSY=e.y;}}
      else{e.diveT+=.025;const t=Math.min(e.diveT,1),tx=e.ox+fX,ty=e.oy,cx=(e.rSX+tx)/2,cy=Math.min(e.rSY,ty)-85;e.x=bez(t,e.rSX,cx,tx);e.y=bez(t,e.rSY,cy,ty);if(e.diveT>=1){e.diving=false;e.diveT=0;e.dPhase=0;e.fig8=false;}}
    }
    if(e.y>H+50&&e.dPhase===0)e.dead=true;
  }

  // Remove dead enemies from formation (but keep array reference for count checks)
  // We do NOT splice here to keep positions stable for dive patterns
}

// ── WAVE CLEAR CHECK (simple, called every frame) ──
function checkWaveClear(){
  if(waveState!=='active')return;
  const alive=ENEMIES.filter(e=>!e.dead);
  if(alive.length>0)return; // enemies still alive
  if(bossMode&&alive.filter(e=>e.type===6).length===0&&ENEMIES.some(e=>e.type===6)){
    // boss just died - handled in killEnemy
  }
  // All dead → start countdown
  if(waveClearTimer===0)waveClearTimer=1; // start it
  waveClearTimer++;
  if(waveClearTimer>30){ // 0.5s grace → next wave
    waveState='clearing';
    nextWave();
  }
}

// ══════════════════════════════════════════════
// COLLISION
// ══════════════════════════════════════════════
function checkCols(){
  // PB vs enemies
  for(let bi=PB.length-1;bi>=0;bi--){
    const b=PB[bi];
    if(b.trail){b.trail.push({x:b.x,y:b.y});if(b.trail.length>7)b.trail.shift();}
    if(b.homing){const al=ENEMIES.filter(e=>!e.dead);if(al.length){const nt=al.sort((a,c)=>Math.hypot(a.x-b.x,a.y-b.y)-Math.hypot(c.x-b.x,c.y-b.y))[0];b.vx+=(nt.x-b.x)*.007;b.vy+=(nt.y-b.y)*.007;const sp=Math.hypot(b.vx,b.vy);if(sp>10){b.vx=b.vx/sp*10;b.vy=b.vy/sp*10;}}}
    b.x+=b.vx;b.y+=b.vy;
    if(b.y<-20||b.y>H+20||b.x<-20||b.x>W+20){PB.splice(bi,1);continue;}
    let hit=false;
    for(const e of ENEMIES){
      if(e.dead||(!e.visible&&e.type===5)||e.popT<.5)continue;
      if(Math.abs(b.x-e.x)<e.w/2+3&&Math.abs(b.y-e.y)<e.h/2+4){
        const dmg=Math.ceil((b.dmg||1)*pv('turret'));
        e.hp-=dmg;e.hf=7;hits++;
        dnum(e.x+(Math.random()-.5)*12,e.y-8,dmg,EC[e.ci][0]);
        burst(b.x,b.y,4,[EC[e.ci][0]],3);
        hit=true;if(e.hp<=0)killEnemy(e);if(!b.nuke)break;
      }
    }
    if(hit&&!b.sp)PB.splice(bi,1);
  }
  // EB vs player
  nearMiss=false;
  for(let bi=EB.length-1;bi>=0;bi--){
    const b=EB[bi];b.x+=b.vx;b.y+=b.vy;
    if(Math.hypot(b.x-P.x,b.y-P.y)<80)nearMiss=true;
    if(b.y>H+20||b.y<-20||b.x<-20||b.x>W+20){EB.splice(bi,1);continue;}
    if(P.inv>0)continue;
    if(Math.abs(b.x-P.x)<14&&Math.abs(b.y-P.y)<14){EB.splice(bi,1);hitPlayer();}
  }
  // Enemies touching player
  for(const e of ENEMIES){if(e.dead||P.inv>0||e.popT<.5)continue;if(Math.abs(e.x-P.x)<e.w/2+12&&Math.abs(e.y-P.y)<e.h/2+12){burst(e.x,e.y,12,[EC[e.ci][0],'#fff'],4);shake(4);e.dead=true;hitPlayer();}}
  // PU pickup
  tickPUPS();
}

function killEnemy(e){
  e.dead=true;
  burst(e.x,e.y,e.type===6?36:12,[EC[e.ci][0],EC[e.ci][1],'#fff','#ffff00'],e.type===6?8:4);
  shake(e.type===6?13:2);combo++;comboT=180;if(combo>comboMax)comboMax=combo;
  const mult=[1,1,1.5,2,3,4,6,8,10,12,15][Math.min(combo,10)];
  const pts=Math.round(e.pts*DIFFS[DI].sx*mult);
  score+=pts;kills++;
  const enames=['GRUNT','SHOOTER','TANK','ZIGZAG','SPLITTER','PHANTOM','BOSS'][e.type]||'ENEMY';
  killFeed(enames,EC[e.ci][0]);
  const ce=Math.round(e.pts*.04*DIFFS[DI].cx*mult);
  runCoins+=ce;gainE(e.eg);
  const pc=combo>=10?'#ff00ff':combo>=5?'#ffff00':'#00ffff';
  pop(e.x+(Math.random()-.5)*16,e.y-10,combo>=2?`+${pts.toLocaleString()} ×${combo}`:`+${pts.toLocaleString()}`,pc);
  if(ce>0){pop(e.x+(Math.random()-.5)*16,e.y-22,`💰+${ce}`,'#ffff00');spawnCoins(e.x,e.y,ce);}
  dropPU(e.x,e.y);
  if(e.type===4){for(let k=-1;k<=1;k+=2){const m=makeE(0,e.x+k*16,e.y,e.row,e.col2);m.pts=60;m.eg=3;m.popT=1;ENEMIES.push(m);}}
  if(kills===1)ach('first_blood');if(combo>=10)ach('combo10');if(kills>=100)ach('centurion');
  if(e.type===6){ach('boss_slayer');waveState='clearing';nextWave();}
}

function hitPlayer(){
  combo=0;comboT=0;waveClean=false;if(P.shield){P.shHp--;shake(4);flash('#00ffff',7);burst(P.x,P.y,8,['#00ffff','#fff'],4);if(P.shHp<=0)P.shield=false;P.inv=pv('armor');return;}
  lives--;shake(10);flash('#ff0044',18);burst(P.x,P.y,24,['#00aaff','#0066ff','#fff'],6);P.inv=pv('armor');
  if(lives<=0){state='dead';setTimeout(gameOver,900);}
  updateLives();
}

// ══════════════════════════════════════════════
// WAVE MANAGEMENT
// ══════════════════════════════════════════════
function nextWave(){
  if(waveClean)ach('untouchable');
  const wc=Math.round(ENEMIES.filter(e=>e.dead&&e.type!==6).length*5*DIFFS[DI].cx);
  addCoins(wc);
  if(wc>0)pop(W/2,H*.55,`WAVE BONUS +${wc}💰`,'#ffff00');
  if(waveClean)pop(W/2,H*.62,'✦ FLAWLESS ✦','#00ff88');
  // CLEAR burst
  for(let i=0;i<16;i++){const a=(i/16)*Math.PI*2;burst(W/2,H*.5,1,[['#00ffff','#ffff00','#ff00ff'][i%3]],6);}
  burst(W/2,H*.5,20,['#00ffff','#ffff00','#ff00ff','#fff'],7);
  wave++;waveClean=true;waveClearTimer=0;
  if(wave>=10)ach('wave10');
  const wvEl=document.getElementById('hWv');wvEl.textContent='WAVE '+wave;
  wvEl.style.transform='scale(1.4)';wvEl.style.transition='transform .25s';
  setTimeout(()=>wvEl.style.transform='scale(1)',250);
  // Announce
  const el=document.getElementById('ann');
  const isBoss=wave%5===0;
  el.textContent=isBoss?'⚡ BOSS WAVE '+wave+'!':'WAVE '+wave;
  el.style.color=isBoss?'#ff0044':'#ffff00';
  el.style.fontSize=isBoss?'26px':'28px';
  clearTimeout(el._t);el.style.opacity='1';
  el._t=setTimeout(()=>el.style.opacity='0',1200);
  setTimeout(()=>{
    const el2=document.getElementById('ann');
    el2.style.fontSize='16px';
    el2.textContent=isBoss?'⚠ PREPARE FOR BATTLE':'GET READY';
    el2.style.color=isBoss?'#ff8800':'#00ffff';
    el2.style.opacity='.75';
    setTimeout(()=>{el2.style.opacity='0';el2.style.fontSize='28px';},900);
  },900);
  setTimeout(()=>spawnWave(wave), 1600);
}

// ══════════════════════════════════════════════
// DRAW ENEMIES
// ══════════════════════════════════════════════
function drawEnemyShape(e,col,hw,hh){
  // Shared minimal shape for glow pre-pass (performance)
  const t=e.animT;
  if(e.type===0){X.fillStyle=col[0];X.beginPath();X.moveTo(0,-hh);X.lineTo(hw,hh*.5);X.lineTo(hw*.5,hh);X.lineTo(-hw*.5,hh);X.lineTo(-hw,hh*.5);X.closePath();X.fill();}
  else if(e.type===1){X.fillStyle=col[0];X.beginPath();X.moveTo(0,-hh);X.lineTo(hw,hh*.6);X.lineTo(hw*.3,hh);X.lineTo(-hw*.3,hh);X.lineTo(-hw,hh*.6);X.closePath();X.fill();}
  else if(e.type===2){X.fillStyle=col[0];X.beginPath();X.arc(0,0,hh*.95,0,Math.PI*2);X.fill();}
  else if(e.type===3){X.fillStyle=col[0];X.beginPath();X.moveTo(0,-hh);X.lineTo(hw,hh);X.lineTo(0,hh*.3);X.lineTo(-hw,hh);X.closePath();X.fill();}
  else if(e.type===4){X.fillStyle=col[0]+'bb';X.beginPath();X.ellipse(-5,0,hw*.55,hh*.9,0,0,Math.PI*2);X.fill();X.beginPath();X.ellipse(5,0,hw*.55,hh*.9,0,0,Math.PI*2);X.fill();}
  else if(e.type===5){X.fillStyle=col[0]+'cc';X.beginPath();X.moveTo(0,-hh);X.lineTo(hw,0);X.lineTo(0,hh);X.lineTo(-hw,0);X.closePath();X.fill();}
}

function drawEnemy(e){
  const t=e.animT,col=EC[e.ci],hw=e.w/2,hh=e.h/2;
  const sc=Math.max(0,Math.min(1,e.popT));
  const baseAlp=e.type===5?(e.visible?sc:.1*sc):(e.hf>0?(.3+.7*Math.sin(e.hf*.8))*sc:sc);
  if(baseAlp<=0)return;

  // Glow pre-pass (cheaper than shadowBlur)
  if(e.type!==6&&sc>=1){
    X.save();X.translate(e.x,e.y);X.scale(1.45,1.45);X.globalAlpha=baseAlp*.09;
    drawEnemyShape(e,col,hw,hh);
    X.restore();
    X.save();X.translate(e.x,e.y);X.scale(1.2,1.2);X.globalAlpha=baseAlp*.11;
    drawEnemyShape(e,col,hw,hh);
    X.restore();
  }

  X.save();X.translate(e.x,e.y);
  if(sc<1)X.scale(sc,sc);
  X.globalAlpha=baseAlp;

  // ──────────────────────────────────────────
  if(e.type===6){
    // BOSS — multi-ring warship
    const pulse=.5+.5*Math.sin(t*1.8),hpF=e.hp/e.maxHp;
    const rr=hw+12+pulse*6;
    // Outer energy ring (double-width fake glow)
    X.globalAlpha=baseAlp*.2;X.strokeStyle=col[0];X.lineWidth=10;
    X.beginPath();X.arc(0,0,rr,0,Math.PI*2);X.stroke();
    X.globalAlpha=baseAlp*.5;X.lineWidth=2.5;
    X.beginPath();X.arc(0,0,rr,0,Math.PI*2);X.stroke();
    X.globalAlpha=baseAlp;

    // Rotating outer ring with tick marks
    X.save();X.rotate(t*.22);X.strokeStyle=col[0]+'88';X.lineWidth=1.5;
    for(let i=0;i<12;i++){const a2=(i/12)*Math.PI*2;X.beginPath();X.moveTo(Math.cos(a2)*(rr-4),Math.sin(a2)*(rr-4));X.lineTo(Math.cos(a2)*(rr+2),Math.sin(a2)*(rr+2));X.stroke();}
    X.restore();

    // Body hexagon with gradient
    const bg=X.createRadialGradient(0,-hw*.2,0,0,0,hw);
    bg.addColorStop(0,col[1]);bg.addColorStop(.5,col[0]+'cc');bg.addColorStop(1,col[0]+'44');
    X.fillStyle=bg;
    X.beginPath();
    for(let i=0;i<6;i++){const a2=(i/6)*Math.PI*2+t*.1;i===0?X.moveTo(Math.cos(a2)*hw,Math.sin(a2)*hh):X.lineTo(Math.cos(a2)*hw,Math.sin(a2)*hh);}
    X.closePath();X.fill();

    // Inner hexagon border
    X.strokeStyle=col[1];X.lineWidth=2;
    X.beginPath();
    for(let i=0;i<6;i++){const a2=(i/6)*Math.PI*2+t*.1;i===0?X.moveTo(Math.cos(a2)*hw*.7,Math.sin(a2)*hh*.7):X.lineTo(Math.cos(a2)*hw*.7,Math.sin(a2)*hh*.7);}
    X.closePath();X.stroke();

    // 3 rotating cannon arms
    for(let i=0;i<3;i++){
      X.save();X.rotate(t*.35+i*(Math.PI*2/3));
      X.fillStyle=col[0]+'99';X.fillRect(hw*.42,-3,hw*.42,6);
      X.fillStyle=col[0];X.fillRect(hw*.84-1,-2.5,9,5);
      // Cannon tip glow
      X.globalAlpha=baseAlp*(.4+.4*Math.sin(t*4+i));
      X.fillStyle=col[1];X.beginPath();X.arc(hw*.88+4,0,3,0,Math.PI*2);X.fill();
      X.restore();
    }

    // Eye — large animated pupil
    X.globalAlpha=baseAlp;
    X.fillStyle='#001122';X.beginPath();X.ellipse(0,-4,13,10,0,0,Math.PI*2);X.fill();
    X.fillStyle='#fff';X.beginPath();X.ellipse(0,-4,11,8,0,0,Math.PI*2);X.fill();
    // Iris gradient
    const ig=X.createRadialGradient(Math.sin(t)*.4*5,-4,0,0,-4,8);
    ig.addColorStop(0,'#fff');ig.addColorStop(.35,col[0]);ig.addColorStop(.75,col[0]+'aa');ig.addColorStop(1,'transparent');
    X.fillStyle=ig;X.beginPath();X.ellipse(Math.sin(t)*4,-4,6.5,6,0,0,Math.PI*2);X.fill();
    // Pupil
    X.fillStyle='#000';X.beginPath();X.arc(Math.sin(t)*4,-4,2.5,0,Math.PI*2);X.fill();
    // Eye glow ring
    X.globalAlpha=baseAlp*(.3+.3*pulse);X.strokeStyle=col[0];X.lineWidth=1.5;
    X.beginPath();X.ellipse(0,-4,12,9,0,0,Math.PI*2);X.stroke();

    // HP bar
    X.globalAlpha=baseAlp*.9;
    X.fillStyle='rgba(0,0,0,.65)';X.fillRect(-hw,-hh-14,e.w,8);
    X.fillStyle=hpF>.5?'#00ff44':hpF>.25?'#ffaa00':'#ff2222';
    X.fillRect(-hw,-hh-14,e.w*hpF,8);
    X.strokeStyle='rgba(255,255,255,.2)';X.lineWidth=1;X.strokeRect(-hw,-hh-14,e.w,8);
    X.font='6px Orbitron';X.fillStyle='#fff';X.textAlign='center';X.fillText('BOSS',0,-hh-7);

  } else if(e.type===0){
    // GRUNT — classic invader redesign
    const jitter=Math.sin(t*3)>.2?1:-1;
    // Body panels
    const bg=X.createLinearGradient(0,-hh,0,hh);bg.addColorStop(0,col[1]);bg.addColorStop(1,col[0]+'88');
    X.fillStyle=bg;
    X.beginPath();X.moveTo(-hw+3,-hh);X.lineTo(hw-3,-hh);X.lineTo(hw,hh*.4);X.lineTo(hw-5,hh);X.lineTo(-hw+5,hh);X.lineTo(-hw,hh*.4);X.closePath();X.fill();
    // Center panel divider
    X.fillStyle='rgba(0,0,0,.3)';X.fillRect(-1,-hh,2,hh*2);
    // Side wing nubs (animated)
    X.fillStyle=col[0];
    X.fillRect(-hw,-hh+3+jitter,5,7);X.fillRect(hw-5,-hh+3+jitter,5,7);
    X.fillRect(-hw,hh-5+jitter,6,6);X.fillRect(hw-6,hh-5+jitter,6,6);
    // Eyes
    X.fillStyle='#fff';X.beginPath();X.arc(-5,-2,3.5,0,Math.PI*2);X.arc(5,-2,3.5,0,Math.PI*2);X.fill();
    X.fillStyle=col[0];X.beginPath();X.arc(-5,-2,2,0,Math.PI*2);X.arc(5,-2,2,0,Math.PI*2);X.fill();
    // Underbelly nozzles
    X.fillStyle=col[1];X.fillRect(-6,hh-3,4,5);X.fillRect(2,hh-3,4,5);

  } else if(e.type===1){
    // SHOOTER — angular fighter with gun barrel
    const bg=X.createLinearGradient(-hw,0,hw,0);bg.addColorStop(0,col[0]+'66');bg.addColorStop(.5,col[1]);bg.addColorStop(1,col[0]+'66');
    X.fillStyle=bg;
    X.beginPath();X.moveTo(0,-hh);X.lineTo(hw*.85,hh*.55);X.lineTo(hw*.35,hh);X.lineTo(-hw*.35,hh);X.lineTo(-hw*.85,hh*.55);X.closePath();X.fill();
    // Wing cuts
    X.fillStyle='rgba(0,0,0,.4)';
    X.beginPath();X.moveTo(-hw*.6,hh*.2);X.lineTo(-hw*.85,hh*.55);X.lineTo(-hw*.45,hh*.35);X.closePath();X.fill();
    X.beginPath();X.moveTo(hw*.6,hh*.2);X.lineTo(hw*.85,hh*.55);X.lineTo(hw*.45,hh*.35);X.closePath();X.fill();
    // Center hull line
    X.fillStyle=col[1];X.globalAlpha=baseAlp*.5;X.fillRect(-2,-hh*.6,4,hh);X.globalAlpha=baseAlp;
    // Barrel
    X.fillStyle=col[0];X.fillRect(-2.5,hh-1,5,10);
    X.fillStyle=col[1];X.fillRect(-1.5,hh,3,8);
    // Barrel flash
    if(e.hf>0){X.globalAlpha=baseAlp*(e.hf/7)*.9;X.fillStyle='#ffff44';X.beginPath();X.arc(0,hh+11,5.5,0,Math.PI*2);X.fill();X.globalAlpha=baseAlp;}
    // Eyes
    X.fillStyle='#fff';X.beginPath();X.arc(-5,-3,2.5,0,Math.PI*2);X.arc(5,-3,2.5,0,Math.PI*2);X.fill();
    X.fillStyle=col[0];X.beginPath();X.arc(-5,-3,1.5,0,Math.PI*2);X.arc(5,-3,1.5,0,Math.PI*2);X.fill();

  } else if(e.type===2){
    // TANK — armored spherical hull with rotating plates
    // Outer shell gradient
    const tg=X.createRadialGradient(-hh*.3,-hh*.3,1,0,0,hh);
    tg.addColorStop(0,col[1]);tg.addColorStop(.5,col[0]);tg.addColorStop(1,col[0]+'55');
    X.fillStyle=tg;X.beginPath();X.arc(0,0,hh,0,Math.PI*2);X.fill();
    // Rotating armor ring
    X.save();X.rotate(t*.15);X.strokeStyle=col[1];X.lineWidth=4;
    X.globalAlpha=baseAlp*.7;
    X.beginPath();X.arc(0,0,hh-2,0,Math.PI*2);X.stroke();
    X.globalAlpha=baseAlp;
    // Armor bolts
    for(let i=0;i<6;i++){const a2=(i/6)*Math.PI*2;X.fillStyle=col[1];X.beginPath();X.arc(Math.cos(a2)*(hh-4),Math.sin(a2)*(hh-4),2,0,Math.PI*2);X.fill();}
    X.restore();
    // Rotating weapon pods
    for(let i=0;i<3;i++){
      X.save();X.rotate(t*.18+i*(Math.PI*2/3));
      X.fillStyle=col[0]+'aa';X.fillRect(hh*.4,-2,hh*.45,4);
      X.fillStyle=col[1];X.fillRect(hh*.82,-1.5,7,3);
      X.restore();
    }
    // Core eye
    X.fillStyle='rgba(0,0,0,.7)';X.beginPath();X.arc(0,0,6,0,Math.PI*2);X.fill();
    X.fillStyle=col[1];X.globalAlpha=baseAlp*(.5+.4*Math.sin(t*3));X.beginPath();X.arc(0,0,4,0,Math.PI*2);X.fill();
    X.globalAlpha=baseAlp;
    // HP bar
    const hpF2=e.hp/e.maxHp;
    X.fillStyle='rgba(0,0,0,.5)';X.fillRect(-hh,-hh-8,hh*2,5);
    X.fillStyle=hpF2>.5?'#44ff44':hpF2>.25?'#ffaa00':'#ff3333';X.fillRect(-hh,-hh-8,hh*2*hpF2,5);

  } else if(e.type===3){
    // ZIGZAG — sleek dart with swept wings
    const bg=X.createLinearGradient(0,-hh,0,hh);bg.addColorStop(0,col[1]);bg.addColorStop(.6,col[0]);bg.addColorStop(1,col[0]+'44');
    X.fillStyle=bg;
    X.beginPath();X.moveTo(0,-hh);X.lineTo(hw*.65,0);X.lineTo(hw,hh);X.lineTo(0,hh*.3);X.lineTo(-hw,hh);X.lineTo(-hw*.65,0);X.closePath();X.fill();
    // Center body ridge
    X.fillStyle=col[1];X.globalAlpha=baseAlp*.6;
    X.beginPath();X.moveTo(0,-hh*.8);X.lineTo(2,hh*.2);X.lineTo(-2,hh*.2);X.closePath();X.fill();
    X.globalAlpha=baseAlp;
    // Wing markings
    X.fillStyle='rgba(0,0,0,.35)';
    X.beginPath();X.moveTo(-hw*.3,hh*.4);X.lineTo(-hw,hh);X.lineTo(-hw*.65,hh*.55);X.closePath();X.fill();
    X.beginPath();X.moveTo(hw*.3,hh*.4);X.lineTo(hw,hh);X.lineTo(hw*.65,hh*.55);X.closePath();X.fill();
    // Speed exhaust lines
    X.strokeStyle=col[0]+'88';X.lineWidth=1.5;
    const splines=[[-4,hh+2,-4,hh+8],[0,hh+2,0,hh+10],[4,hh+2,4,hh+8]];
    for(const [x1,y1,x2,y2] of splines){X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.stroke();}
    // Eyes
    X.fillStyle='#fff';X.beginPath();X.arc(-4,-hh*.3,2.5,0,Math.PI*2);X.arc(4,-hh*.3,2.5,0,Math.PI*2);X.fill();
    X.fillStyle=col[0];X.beginPath();X.arc(-4,-hh*.3,1.5,0,Math.PI*2);X.arc(4,-hh*.3,1.5,0,Math.PI*2);X.fill();

  } else if(e.type===4){
    // SPLITTER — two cellular lobes with membrane
    const lobe=(lx,ly)=>{
      const lg=X.createRadialGradient(lx-3,ly-3,1,lx,ly,hw*.62);
      lg.addColorStop(0,col[1]);lg.addColorStop(.55,col[0]);lg.addColorStop(1,col[0]+'44');
      X.fillStyle=lg;X.beginPath();X.ellipse(lx,ly,hw*.6,hh*.88,0,0,Math.PI*2);X.fill();
      // Surface detail rings
      X.strokeStyle=col[1];X.lineWidth=1;X.globalAlpha=baseAlp*.35;
      X.beginPath();X.ellipse(lx,ly,hw*.38,hh*.55,0,0,Math.PI*2);X.stroke();
      X.globalAlpha=baseAlp;
      // Nucleus
      X.fillStyle=col[1];X.globalAlpha=baseAlp*(.5+.3*Math.sin(t*2.5));
      X.beginPath();X.arc(lx,ly,3,0,Math.PI*2);X.fill();
      X.globalAlpha=baseAlp;
    };
    lobe(-6,0);lobe(6,0);
    // Fission crack (glowing seam)
    const crackAlp=.4+.35*Math.abs(Math.sin(t*3));
    X.globalAlpha=baseAlp*crackAlp;X.strokeStyle=col[1];X.lineWidth=2;
    X.beginPath();X.moveTo(0,-hh*.8);X.lineTo(0,hh*.8);X.stroke();
    X.globalAlpha=baseAlp;

  } else if(e.type===5){
    // PHANTOM — diamond with rotating energy tendrils
    const phAlp=e.visible?1:.08;
    X.globalAlpha=baseAlp*phAlp;
    // Outer diamond
    const pg=X.createLinearGradient(-hw,0,hw,0);
    pg.addColorStop(0,col[0]+'22');pg.addColorStop(.5,col[0]+'cc');pg.addColorStop(1,col[0]+'22');
    X.fillStyle=pg;
    X.beginPath();X.moveTo(0,-hh);X.lineTo(hw,0);X.lineTo(0,hh);X.lineTo(-hw,0);X.closePath();X.fill();
    // Inner diamond
    X.fillStyle=col[1];X.globalAlpha=baseAlp*phAlp*.5;
    X.beginPath();X.moveTo(0,-hh*.55);X.lineTo(hw*.5,0);X.lineTo(0,hh*.55);X.lineTo(-hw*.5,0);X.closePath();X.fill();
    // Rotating energy arms
    X.globalAlpha=baseAlp*phAlp*.6;
    for(let i=0;i<4;i++){
      X.save();X.rotate(t*.9+i*Math.PI*.5);
      X.strokeStyle=col[0];X.lineWidth=1.5;
      X.beginPath();X.moveTo(0,0);X.quadraticCurveTo(hw*.3,hw*.3,hw*.7,0);X.stroke();
      X.restore();
    }
    // Core pulse
    X.globalAlpha=baseAlp*phAlp*(.5+.45*Math.sin(t*4));
    X.fillStyle=col[1];X.beginPath();X.arc(0,0,4.5,0,Math.PI*2);X.fill();
    X.globalAlpha=baseAlp;
  }

  // Hit flash overlay
  if(e.hf>0&&e.type!==6){
    X.globalAlpha=baseAlp*(e.hf/7)*.45;X.fillStyle='#fff';
    if(e.type===2){X.beginPath();X.arc(0,0,hh,0,Math.PI*2);X.fill();}
    else X.fillRect(-hw,-hh,e.w,e.h);
  }
  // HP bar for multi-HP non-boss
  if(e.maxHp>1&&e.type!==6&&e.type!==2&&e.hp<e.maxHp){
    const hpF=e.hp/e.maxHp;
    X.globalAlpha=baseAlp*.8;
    X.fillStyle='rgba(0,0,0,.5)';X.fillRect(-hw,-hh-7,e.w,4.5);
    X.fillStyle=hpF>.6?'#44ff44':hpF>.3?'#ffaa00':'#ff3333';X.fillRect(-hw,-hh-7,e.w*hpF,4.5);
  }
  X.restore();
}

// ══════════════════════════════════════════════
// DRAW BULLETS
// ══════════════════════════════════════════════
function drawBullets(){
  X.globalAlpha=1;
  // Player bullets
  for(const b of PB){
    // Trail
    if(b.trail&&b.trail.length>1){
      for(let i=1;i<b.trail.length;i++){
        const t2=b.trail[i],ta=i/b.trail.length;
        X.globalAlpha=ta*.22;X.fillStyle=b.col;
        X.fillRect(t2.x-1,t2.y,2,3);
      }
      X.globalAlpha=1;
    }
    if(b.w>=9){
      // Plasma ball — soft glow ring + bright core
      X.globalAlpha=.18;X.fillStyle=b.col;
      X.beginPath();X.arc(b.x,b.y,b.w/2+4,0,Math.PI*2);X.fill();
      X.globalAlpha=.7;X.fillStyle=b.col;
      X.beginPath();X.arc(b.x,b.y,b.w/2,0,Math.PI*2);X.fill();
      X.globalAlpha=1;X.fillStyle='#fff';
      X.beginPath();X.arc(b.x-b.w*.12,b.y-b.w*.12,b.w*.22,0,Math.PI*2);X.fill();
    } else {
      // Laser bolt — outer glow + bright inner + white core
      const hw=b.w/2,hh=b.h/2;
      // Outer glow ring
      X.globalAlpha=.15;X.fillStyle=b.col;
      X.fillRect(b.x-hw-2,b.y-hh-2,b.w+4,b.h+4);
      // Main body
      X.globalAlpha=.85;X.fillStyle=b.col;
      X.fillRect(b.x-hw,b.y-hh,b.w,b.h);
      // Bright core
      X.globalAlpha=1;X.fillStyle='rgba(255,255,255,.9)';
      X.fillRect(b.x-.7,b.y-hh,1.4,b.h*.6);
      // Tip flare
      X.fillStyle='#fff';X.beginPath();X.arc(b.x,b.y-hh,b.w*.45,0,Math.PI*2);X.fill();
    }
  }
  X.globalAlpha=1;

  // Enemy bullets — orbs with soft outer ring
  for(const b of EB){
    const r=b.w/2+1;
    X.globalAlpha=.2;X.fillStyle=b.col;X.beginPath();X.arc(b.x,b.y,r+3,0,Math.PI*2);X.fill();
    X.globalAlpha=.8;X.fillStyle=b.col;X.beginPath();X.arc(b.x,b.y,r,0,Math.PI*2);X.fill();
    X.globalAlpha=1;X.fillStyle='rgba(255,255,255,.65)';X.beginPath();X.arc(b.x-r*.25,b.y-r*.25,r*.3,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;
}

// ══════════════════════════════════════════════
// COMBO DISPLAY
// ══════════════════════════════════════════════
function drawCombo(){
  if(comboT>0){comboT--;if(comboT===0)combo=0;}
  // Score multiplier indicator (subtle, top area)
  if(combo>=5){
    const col=combo>=10?'#ff00ff':'#ffff00';
    const pct=comboT/180;
    X.save();X.globalAlpha=pct*.9;X.textAlign='right';
    X.font=`bold ${10+Math.min(combo-5,6)}px Orbitron`;
    X.fillStyle=col;X.fillText(`×${[1,1,1.5,2,3,4,6,8,10,12,15][Math.min(combo,10)]}`,W-8,H-70);
    X.restore();
  }
  if(combo<2)return;
  const col=combo>=10?'#ff00ff':combo>=5?'#ffff00':'#00ffff';
  X.save();X.globalAlpha=Math.min(1,comboT/55);X.translate(W/2,H*.37);
  X.fillStyle=col;X.font=`bold ${16+Math.min(combo,12)}px Orbitron`;X.textAlign='center';X.textBaseline='middle';
  X.fillText(`${combo}× COMBO`,0,0);
  const m=[1,1,1.5,2,3,4,6,8,10,12,15][Math.min(combo,10)];
  X.font='8px Orbitron';X.fillStyle=col+'88';X.fillText('×'+m+' SCORE',0,15);
  X.restore();
}

// ══════════════════════════════════════════════
// HUD (canvas drawn)
// ══════════════════════════════════════════════
function drawHUD(){

  // Weapon label
  const w=WPNS[SV.d.activeWpn];
  document.getElementById('hWpn').textContent=w.ic+' '+w.n;
  document.getElementById('hWpn').style.color=w.col;
  // ── Formation mini-map (top right) ──
  if(formation.length>0&&!bossMode){
    const mx=W-10,my=46,mw=60,mh=36;
    X.save();X.globalAlpha=.7;
    X.fillStyle='rgba(0,0,8,.7)';X.fillRect(mx-mw,my,mw,mh);
    X.strokeStyle='#ffffff18';X.lineWidth=1;X.strokeRect(mx-mw,my,mw,mh);
    for(const e of formation){
      if(e.dead)continue;
      const fx=(mx-mw)+(e.ox/(W))*mw;
      const fy=my+4+(e.oy/200)*Math.min(mh-8,20);
      X.fillStyle=EC[e.ci][0];X.fillRect(fx-2,fy-2,4,4);
    }
    X.fillStyle='#00ffff';X.fillRect(mx-mw+(P.x/W)*mw-2,my+mh-5,4,3);
    // label
    X.font='6px Orbitron';X.fillStyle='#ffffff22';X.textAlign='right';X.fillText('MAP',mx-2,my+mh-2);
    X.restore();
  }
  // Boss HP bar (full width, near top)
  if(bossMode){
    const boss=ENEMIES.find(e=>!e.dead&&e.type===6);
    if(boss){
      const bpct=boss.hp/boss.maxHp;
      X.save();X.globalAlpha=.75;
      X.fillStyle='rgba(0,0,0,.5)';X.fillRect(60,4,W-120,7);
      X.fillStyle=bpct>.5?'#ff4444':bpct>.25?'#ff8800':'#ff0044';
      X.fillRect(60,4,(W-120)*bpct,7);
      X.strokeStyle='#ff444488';X.lineWidth=1;X.strokeRect(60,4,W-120,7);
      X.font='7px Orbitron';X.fillStyle='#fff';X.textAlign='center';
      X.fillText('BOSS',W/2,10);
      X.restore();
    }
  }

  // Near-miss edge flash
  if(nearMiss&&P.inv===0){
    const eg2=X.createRadialGradient(W/2,H/2,H*.3,W/2,H/2,H*.8);
    eg2.addColorStop(0,'transparent');
    eg2.addColorStop(1,'rgba(255,50,0,.2)');
    X.fillStyle=eg2;X.fillRect(0,0,W,H);
  }
  // Vignette
  const v=X.createRadialGradient(W/2,H/2,H*.22,W/2,H/2,H*.76);
  v.addColorStop(0,'transparent');v.addColorStop(1,'rgba(0,0,0,.5)');
  X.fillStyle=v;X.fillRect(0,0,W,H);
  // Danger arrows (off-screen)
  for(const e of ENEMIES){if(e.dead||e.y>10)continue;const ax=Math.max(14,Math.min(W-14,e.x));X.globalAlpha=.7;X.fillStyle=EC[e.ci][0];X.beginPath();X.moveTo(ax,7);X.lineTo(ax-6,17);X.lineTo(ax+6,17);X.closePath();X.fill();}
  // Dive warning — red arrow following diver
  for(const e of ENEMIES){
    if(e.dead||!e.diving||!e.diveWarn||e.diveWarn<=0)continue;
    e.diveWarn--;
    const a=Math.atan2(P.y-e.y,P.x-e.x);
    X.save();X.globalAlpha=(e.diveWarn/40)*.85;X.translate(e.x,e.y);X.rotate(a);
    X.fillStyle='#ff4444';X.beginPath();X.moveTo(16,0);X.lineTo(4,-5);X.lineTo(4,5);X.closePath();X.fill();
    X.restore();
  }
  X.globalAlpha=1;
}

// ══════════════════════════════════════════════
// TITLE BG
// ══════════════════════════════════════════════
const tbg=document.getElementById('tbg'),tX=tbg.getContext('2d');
let tT=0;
// Title planet (different from game planet, generated once)
const TPLANET={x:W*.75,y:H*.22,r:62,hue:260};

function drawTitleBG(){
  tT++;
  // Deep space gradient
  const sky=tX.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#000206');sky.addColorStop(.4,'#01001a');sky.addColorStop(1,'#040018');
  tX.fillStyle=sky;tX.fillRect(0,0,W,H);

  // Planet with atmosphere
  {const p=TPLANET;
    tX.globalAlpha=.06;tX.fillStyle=`hsl(${p.hue},70%,60%)`;
    tX.beginPath();tX.arc(p.x,p.y,p.r+24,0,Math.PI*2);tX.fill();
    tX.globalAlpha=.12;tX.fillStyle=`hsl(${p.hue},65%,55%)`;
    tX.beginPath();tX.arc(p.x,p.y,p.r+11,0,Math.PI*2);tX.fill();
    const pg=tX.createRadialGradient(p.x-p.r*.3,p.y-p.r*.3,p.r*.08,p.x,p.y,p.r);
    pg.addColorStop(0,`hsl(${p.hue+25},50%,32%)`);pg.addColorStop(.55,`hsl(${p.hue},55%,16%)`);pg.addColorStop(1,`hsl(${p.hue-15},45%,7%)`);
    tX.globalAlpha=.5;tX.fillStyle=pg;tX.beginPath();tX.arc(p.x,p.y,p.r,0,Math.PI*2);tX.fill();
    const sg=tX.createRadialGradient(p.x+p.r*.5,p.y+p.r*.4,0,p.x+p.r*.3,p.y+p.r*.2,p.r*1.1);
    sg.addColorStop(0,'transparent');sg.addColorStop(.55,'transparent');sg.addColorStop(.8,'rgba(0,0,0,.38)');sg.addColorStop(1,'rgba(0,0,0,.6)');
    tX.globalAlpha=1;tX.fillStyle=sg;tX.beginPath();tX.arc(p.x,p.y,p.r,0,Math.PI*2);tX.fill();}

  // Nebula wisps
  for(let i=0;i<3;i++){
    const nx=80+i*140,ny=H*.3+Math.sin(tT*.004+i)*30,nr=90+i*25;
    const ng=tX.createRadialGradient(nx,ny,0,nx,ny,nr);
    ng.addColorStop(0,`hsla(${240+i*40},55%,20%,.07)`);ng.addColorStop(1,'transparent');
    tX.fillStyle=ng;tX.fillRect(nx-nr,ny-nr,nr*2,nr*2);
  }

  // Stars (parallax)
  const sp=[.04,.11,.28];
  for(const s of STARS){
    s.y+=sp[s.layer];if(s.y>H+1)s.y=-1;
    const tw=.3+.5*Math.sin(tT*.012+s.x*6.8);
    tX.globalAlpha=tw*(s.layer*.3+.3);tX.fillStyle=s.c;
    const sz=Math.max(1,s.s*(s.layer*.4+.45))|0;tX.fillRect(s.x|0,s.y|0,sz,sz);
    if(s.layer===2&&sz>=2&&tw>.72){tX.globalAlpha=(tw-.72)*.4;tX.fillStyle='#fff';tX.fillRect(s.x|0-1,s.y|0,sz+2,1);tX.fillRect(s.x|0,s.y|0-1,1,sz+2);}
  }
  tX.globalAlpha=1;

  // ── 3 ENEMY ROWS flying in formation ──
  const rows=[
    {y:H*.12,speed:.35,phase:0,  col:['#ff4444','#ff9999'],n:5},
    {y:H*.18,speed:.28,phase:160,col:['#ff8800','#ffcc44'],n:5},
    {y:H*.24,speed:.22,phase:80, col:['#ff00ff','#ff88ff'],n:4},
  ];
  for(const row of rows){
    for(let i=0;i<row.n;i++){
      const bx=((tT*row.speed+row.phase+i*(W/row.n+12))%(W+80))-40;
      tX.save();tX.translate(bx,row.y+Math.sin(tT*.016+i)*(6));
      tX.globalAlpha=.6;
      // Enemy silhouette
      tX.fillStyle=row.col[0];
      tX.beginPath();tX.moveTo(0,-9);tX.lineTo(-10,7);tX.lineTo(-5,3);tX.lineTo(5,3);tX.lineTo(10,7);tX.closePath();tX.fill();
      tX.fillStyle=row.col[1];tX.globalAlpha=.5;
      tX.beginPath();tX.arc(-3,0,2.5,0,Math.PI*2);tX.arc(3,0,2.5,0,Math.PI*2);tX.fill();
      tX.restore();
    }
  }

  // ── PLAYER SHIP flying at bottom ──
  const sx=(tT*.65)%(W+70)-35,sy=H*.65+Math.sin(tT*.017)*14;
  tX.save();tX.translate(sx,sy);
  // Long thrust trail
  for(let i=0;i<8;i++){
    const ta=1-i/8;tX.globalAlpha=ta*.18;tX.fillStyle=`hsl(${185+i*5},100%,65%)`;
    tX.fillRect(-i*7-6,6,6,2);
  }
  tX.globalAlpha=1;
  // Ship
  const eg2=.5+.5*Math.sin(tT*.2);
  tX.fillStyle=`hsl(${28+eg2*14},100%,${48+eg2*12}%)`;
  tX.beginPath();tX.moveTo(-5,8);tX.lineTo(0,8+(3+eg2*5));tX.lineTo(5,8);tX.closePath();tX.fill();
  const hg=tX.createLinearGradient(0,-13,0,11);hg.addColorStop(0,'#0a2248');hg.addColorStop(.4,'#00aaff99');hg.addColorStop(1,'#061428');
  tX.fillStyle=hg;tX.beginPath();tX.moveTo(0,-13);tX.lineTo(-12,8);tX.lineTo(-5,5);tX.lineTo(5,5);tX.lineTo(12,8);tX.closePath();tX.fill();
  tX.fillStyle='#88eeff';tX.beginPath();tX.ellipse(0,-4,4.5,6,0,0,Math.PI*2);tX.fill();
  tX.fillStyle='rgba(255,255,255,.5)';tX.beginPath();tX.ellipse(-1,-5,1.5,2.5,-.3,0,Math.PI*2);tX.fill();
  // Wing tips blinking
  const wblink=.5+.5*Math.sin(tT*.25);
  tX.fillStyle=`rgba(80,180,255,${.4+wblink*.55})`;
  tX.beginPath();tX.arc(-11,7,2,0,Math.PI*2);tX.fill();
  tX.beginPath();tX.arc(11,7,2,0,Math.PI*2);tX.fill();
  tX.restore();

  // Subtle scanlines
  tX.globalAlpha=.022;tX.fillStyle='#000';
  for(let y=0;y<H;y+=2)tX.fillRect(0,y,W,1);
  tX.globalAlpha=1;
}

// ══════════════════════════════════════════════
// GAME LIFECYCLE
// ══════════════════════════════════════════════
function startGame(){
  hideAll();
  document.getElementById('hud').style.display='flex';
  document.getElementById('pbar').style.display='block';
  document.getElementById('ebar').style.display='block';
  document.getElementById('misshud').style.display='block';
  score=0;wave=1;lives=pv('hull');kills=0;shots=0;hits=0;runCoins=0;
  combo=0;comboT=0;comboMax=0;waveClean=true;
  energy=0;spH=0;spC=0;bgH=220;gtime=0;
  missileStock=SV.d.activeWpn==='missile'?5:0;
  hiSc=SV.d.scores[DI][0]||0;
  PA.length=0;PB.length=0;EB.length=0;PUPS.length=0;POPS.length=0;DN.length=0;SWS.length=0;MS.length=0;FC2.length=0;KF.length=0;P.trail=[];
  ENEMIES.length=0;formation.length=0;waveState='idle';waveClearTimer=0;
  updateEbar();updateLives();
  document.getElementById('hSc').textContent='0';
  document.getElementById('hWv').textContent='WAVE 1';
  document.getElementById('hHi').textContent=hiSc?'BEST '+hiSc.toLocaleString():'';
  document.getElementById('misshud').textContent='🚀'.repeat(missileStock);
  P.reset();state='play';
  // Wave 1 announce + spawn
  const el=document.getElementById('ann');
  el.textContent='WAVE 1';el.style.color='#ffff00';clearTimeout(el._t);el.style.opacity='1';
  el._t=setTimeout(()=>el.style.opacity='0',1200);
  setTimeout(()=>spawnWave(1), 1000); // 1 second delay then enemies appear
}

function gameOver(){
  state='dead';
  document.getElementById('hud').style.display='none';
  document.getElementById('pbar').style.display='none';
  document.getElementById('ebar').style.display='none';
  document.getElementById('misshud').style.display='none';
  const sc=SV.d.scores[DI];sc.push(score);sc.sort((a,b)=>b-a);sc.length=3;
  const secs=Math.round(gtime/60);
  if(!SV.d.bestTime)SV.d.bestTime=[0,0,0];
  if(secs>( SV.d.bestTime[DI]||0))SV.d.bestTime[DI]=secs;
  addCoins(runCoins);
  const acc=shots>0?Math.round(hits/shots*100):0;
  // Animated score count-up
  let displayed=0;
  const target=score;
  const tick=()=>{
    displayed=Math.min(target,displayed+Math.ceil(target/60));
    document.getElementById('gsc').textContent=displayed.toLocaleString();
    if(displayed<target)requestAnimationFrame(tick);
    else{document.getElementById('gsc').textContent=target.toLocaleString();document.getElementById('ghi').textContent=score>=sc[0]?'🏆 NEW HIGH SCORE!':'Best: '+sc[0].toLocaleString();}
  };
  requestAnimationFrame(tick);
  const bt=(SV.d.bestTime&&SV.d.bestTime[DI])||0;
  document.getElementById('gst').innerHTML=`Wave: ${wave} &nbsp;·&nbsp; Kills: ${kills} &nbsp;·&nbsp; Accuracy: ${acc}%<br>Best Combo: ×${comboMax} &nbsp;·&nbsp; Survived: ${fmtTime(secs)}`+(bt?`<br><span style="color:#00ffff">⏱ Personal Best: ${fmtTime(bt)}</span>`:'');
  document.getElementById('gcn').textContent=`💰 +${runCoins} COINS EARNED`;
  // Top 3 scores
  const topEl=document.getElementById('gtop');
  if(topEl){const tops=SV.d.scores[DI].filter(s=>s>0);topEl.innerHTML=tops.length?'<div style="color:#ffffff18;margin-bottom:2px;">— '+DIFFS[DI].n+' LEADERBOARD —</div>'+tops.map((s,i)=>['🥇','🥈','🥉'][i]+' '+s.toLocaleString()).join('&nbsp;&nbsp;'):'';}
  document.getElementById('sDead').classList.remove('hide');
}

function pause(){
  state='paused';
  document.getElementById('sPause').classList.remove('hide');
  const ts=Math.round(gtime/60);
  document.getElementById('pst').innerHTML=`Wave ${wave} &nbsp;·&nbsp; Score ${score.toLocaleString()} &nbsp;·&nbsp; ${kills} Kills<br><span style="color:#00ffff66;font-size:8px;">Time: ${fmtTime(ts)} &nbsp;·&nbsp; Combo: ×${comboMax}</span>`;
}
function resume(){state='play';document.getElementById('sPause').classList.add('hide');}

function hideAll(){['sTitle','sShop','sAch','sDead','sPause'].forEach(id=>document.getElementById(id).classList.add('hide'));document.getElementById('hud').style.display='none';document.getElementById('pbar').style.display='none';document.getElementById('ebar').style.display='none';document.getElementById('misshud').style.display='none';}
function goTitle(){hideAll();document.getElementById('sTitle').classList.remove('hide');state='title';refreshCoins();refreshTitleStats();if(SV.d.scores[DI]?.[0])document.getElementById('hHi').textContent='BEST '+SV.d.scores[DI][0].toLocaleString();else document.getElementById('hHi').textContent='';}
function goShop(){hideAll();document.getElementById('sShop').classList.remove('hide');state='title';refreshCoins();shopTab('w');}
function goAch(){hideAll();document.getElementById('sAch').classList.remove('hide');state='title';buildAch();}

// ══════════════════════════════════════════════
// SHOP
// ══════════════════════════════════════════════
let curTab='w';
function shopTab(tab){
  curTab=tab;
  document.getElementById('tw').classList.toggle('act',tab==='w');
  document.getElementById('tp').classList.toggle('act',tab==='p');
  if(tab==='w')buildWpns();else buildPrts();
}
function toast(msg){let el=document.getElementById('st');if(!el){el=document.createElement('div');el.id='st';el.style.cssText='position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(0,0,8,.95);border:2px solid #ff4444;color:#ff4444;font-size:9px;letter-spacing:2px;padding:7px 16px;z-index:50;font-family:Orbitron,monospace;pointer-events:none;white-space:nowrap;transition:opacity .3s;';document.getElementById('wrap').appendChild(el);}el.textContent=msg;el.style.opacity='1';clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',2000);}
function buildWpns(){
  const el=document.getElementById('shBody');el.innerHTML='<div class="sec">WEAPONS — buy to unlock, tap to equip</div><div class="grid2" id="wg"></div>';
  const g=document.getElementById('wg');
  Object.entries(WPNS).forEach(([k,w])=>{
    const owned=SV.d.wpns[k];const active=SV.d.activeWpn===k;
    const d=document.createElement('div');d.className='card'+(owned?' owned':'')+(active?' active':'');
    if(active)d.style.cssText='border-color:#ffff00;background:rgba(255,255,0,.05);position:relative;';
    d.innerHTML=`<div class="ci">${w.ic}</div><div class="cn">${w.n}</div><div class="cd">${w.desc}</div><div class="cc">${owned?(active?'✓ EQUIPPED':'TAP TO EQUIP'):'💰 '+w.cost.toLocaleString()}</div>`;
    if(owned&&!active)d.onclick=()=>{SV.d.activeWpn=k;SV.save();buildWpns();};
    else if(!owned)d.onclick=()=>{if(SV.d.coins<w.cost){toast('Need 💰'+w.cost.toLocaleString());return;}SV.d.coins-=w.cost;SV.d.wpns[k]=true;SV.d.activeWpn=k;SV.save();refreshCoins();buildWpns();};
    g.appendChild(d);
  });
}
function buildPrts(){
  const el=document.getElementById('shBody');el.innerHTML='<div class="sec">SHIP PARTS — permanent upgrades</div><div class="grid2" id="pg"></div>';
  const g=document.getElementById('pg');
  Object.entries(PRTS).forEach(([k,p])=>{
    const lv=SV.d.parts[k]||0;const maxed=lv>=p.maxLv;const cost=maxed?0:p.costs[lv];
    const d=document.createElement('div');d.className='card'+(maxed?' maxed':'');
    const bars=Array.from({length:p.maxLv},(_,i)=>`<div class="bar${i<lv?' f':''}"></div>`).join('');
    d.innerHTML=`<div style="display:flex;justify-content:space-between"><span style="font-size:9px;font-weight:700;color:#ff00ff;letter-spacing:1px;">${p.n}</span><span style="font-size:17px;">${p.ic}</span></div><div class="cd">${p.desc}</div><div class="bars">${bars}</div><div style="font-size:7px;color:#ffffff28;margin-bottom:4px;">Now: ${p.vals[lv]}${!maxed?' → '+p.vals[lv+1]:''}</div><div class="cc">${maxed?'✓ MAXED':'💰 '+cost.toLocaleString()}</div>`;
    if(!maxed)d.onclick=()=>{if(SV.d.coins<cost){toast('Need 💰'+cost.toLocaleString());return;}SV.d.coins-=cost;SV.d.parts[k]=(lv+1);SV.save();refreshCoins();buildPrts();if(Object.values(SV.d.parts).some(v=>v>=4))ach('maxed');};
    g.appendChild(d);
  });
}
function buildAch(){
  const g=document.getElementById('ag');g.innerHTML='';
  ACHS.forEach(a=>{const e=!!SV.d.ach[a.id];const d=document.createElement('div');d.className='ac '+(e?'e':'l');d.innerHTML=`<span style="font-size:15px;">${e?a.ic:'❓'}</span><div><div style="font-size:8px;color:#ffff00;letter-spacing:.5px;">${a.n}</div><div style="font-size:7px;color:#ffffff33;">${a.d}</div></div>`;g.appendChild(d);});
}

// ══════════════════════════════════════════════
// INPUT
// ══════════════════════════════════════════════
const KEYS={};
document.addEventListener('keydown',e=>{KEYS[e.key.toLowerCase()]=true;KEYS[e.key]=true;if(e.key===' ')e.preventDefault();if(e.key==='Escape'){if(state==='play')pause();else if(state==='paused')resume();}});
document.addEventListener('keyup',e=>{KEYS[e.key.toLowerCase()]=false;KEYS[e.key]=false;});
let tX2=null;
cv.addEventListener('touchstart',e=>{e.preventDefault();if(e.touches.length>=2)KEYS['x']=true;else{tX2=e.touches[0].clientX;KEYS[' ']=true;}},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();if(tX2!==null){const dx=e.touches[0].clientX-tX2;P.x=Math.max(18,Math.min(W-18,P.x+dx*.9));tX2=e.touches[0].clientX;}},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();KEYS[' ']=false;KEYS['x']=false;tX2=null;},{passive:false});

// ══════════════════════════════════════════════
// MAIN LOOP
// ══════════════════════════════════════════════
function loop(){
  requestAnimationFrame(loop);
  tickShake();tickFlash();tickPA();tickPops();tickDN();tickSW();tickFC();tickMS();

  if(state==='title'){drawTitleBG();return;}

  X.save();X.translate(SHX,SHY);
  drawBG();

  if(state==='play'||state==='dead'){
    gtime++;
    if(state==='play'){
      P.update();
      updateEnemies();
      checkCols();
      checkWaveClear();
    }
    drawSW();drawBullets();drawMS();
    for(const e of ENEMIES)if(!e.dead)drawEnemy(e);
    drawPUPS();drawPA();drawDN();
    P.draw();drawFC();drawPops();drawCombo();drawKF();drawHUD();
    const scEl=document.getElementById('hSc');
    if(scEl.textContent!==score.toLocaleString()){scEl.textContent=score.toLocaleString();scEl.classList.add('bump');clearTimeout(scEl._bt);scEl._bt=setTimeout(()=>scEl.classList.remove('bump'),100);}
    if(score>hiSc){hiSc=score;document.getElementById('hHi').textContent='BEST '+hiSc.toLocaleString();}
    document.getElementById('pfill').style.width=Math.min(100,(kills/Math.max(1,(wave+1)*8))*100)+'%';
    const ts=Math.round(gtime/60);document.getElementById('hTime').textContent=Math.floor(ts/60)+':'+String(ts%60).padStart(2,'0');
  }

  X.restore();
}

// INIT
refreshCoins();
refreshTitleStats();
loop();
</script>
